<!DOCTYPE html>
<html lang="en" data-site="Bison">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBS Sports</title>
  <link rel="stylesheet" href="https://sportsfly.cbsistatic.com/fly-0862/bundles/sportsmediacss/css/v2/pages/esi/pre-esi-reset.css" />
  <link rel="stylesheet" href="https://www.cbssports.com/_next/static/css/esi/layout.css" />
  <style>
    @font-face {
      font-display: fallback;
      font-family: 'FS Industrie';
      font-style: normal;
      font-weight: 200 900;
      src: url('https://sports.cbsimg.net/fonts/fs-industrie/variable/Std/FSIndustrieVFStd.woff2') format('woff2');
    }
    @font-face {
      font-display: fallback;
      font-family: 'FS Industrie';
      font-style: italic;
      font-weight: 200 900;
      src: url('https://sports.cbsimg.net/fonts/fs-industrie/variable/Std/FSIndustrieVFStd-Italic.woff2') format('woff2');
    }

    :root {
      --global-nav-v2-height: 65px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    body {
      font-family: 'FS Industrie', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── GlobalNav (from site-bison GlobalNav.module.scss) ── */
    #GlobalNav {
      background-color: #fff;
      border-bottom: 1px solid #e0e0e0;
      height: var(--global-nav-v2-height);
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
    }
    #GlobalMainNavLinks {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px minmax(0, 1fr);
      height: 100%;
      margin: 0 auto;
      max-width: 1280px;
      padding: 0 8px;
    }
    .GlobalNavSection { align-items: center; display: flex; }
    .GlobalNavSection--left  { justify-content: flex-start; gap: 4px; }
    .GlobalNavSection--center { justify-content: center; }
    .GlobalNavSection--right { justify-content: flex-end; gap: 4px; }

    .eyeLogoWrap { color: #003DA5; display: flex; align-items: center; gap: 6px; }
    .eyeLogoWrap svg { height: 18px; width: auto; }

    .GlobalNavListItem {
      display: flex;
      align-items: center;
      height: var(--global-nav-v2-height);
      padding: 0 10px;
      font-size: 1rem;
      font-weight: 500;
      color: #1a1a1a;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, color 0.15s;
      font-family: 'FS Industrie', Helvetica, Arial, sans-serif;
    }
    .GlobalNavListItem:hover { border-bottom-color: #003DA5; color: #003DA5; }

    .waffle-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0 10px;
      height: var(--global-nav-v2-height);
      display: flex;
      align-items: center;
      cursor: pointer;
      color: #1a1a1a;
      transition: border-color 0.15s, color 0.15s;
    }
    .waffle-btn:hover { border-bottom-color: #003DA5; color: #003DA5; }

    .GlobalNavListItem--secondary {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #1a1a1a;
    }

    .GlobalNavListItem:hover .nav-dropdown,
    .GlobalNavListItem:focus-within .nav-dropdown { display: block; }
    .nav-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 220px;
      background: #fff;
      border-top: 2px solid #003DA5;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      z-index: 200;
    }
    .GlobalNavListItem--right .nav-dropdown { left: auto; right: 0; }
    .nav-dropdown a {
      display: block; padding: 9px 16px; font-size: 13px;
      color: #1a1a1a; border-bottom: 1px solid #f0f0f0;
      font-family: 'FS Industrie', Helvetica, Arial, sans-serif;
      transition: background 0.1s, color 0.1s;
    }
    .nav-dropdown a:last-child { border-bottom: none; }
    .nav-dropdown a:hover { background: #f0f4ff; color: #003DA5; }
    .nav-dropdown__label {
      display: block; padding: 6px 16px 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #999; background: #fafafa;
      border-bottom: 1px solid #eee;
    }

    /* ── Hello World ── */
    .page-body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100vh - var(--global-nav-v2-height));
    }
    .page-body h1 {
      font-size: 2rem;
      font-weight: 500;
      color: #1a1a1a;
    }
  </style>
</head>
